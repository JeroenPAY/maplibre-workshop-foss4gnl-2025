<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>NDW / PDOK kaart – interactief</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255,255,255,0.95);
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      z-index: 1;
    }

    .controls label {
      font-weight: 600;
      font-size: 13px;
      display: block;
      margin-bottom: 4px;
    }

    .controls select,
    .controls input[type=range] {
      width: 220px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="controls">
  <label for="styleSelect">Kaart kiezen</label>
  <select id="styleSelect">
    <option value="ndw">NDW Basemap</option>
    <option value="ndw-demo">NDW Demo style</option>
    <option value="pdok-luchtfoto">PDOK Luchtfoto</option>
  </select>

  <label><input type="checkbox" id="grayNDW"> NDW grijs/contrast</label>

  <label for="contrastRange">Raster contrast (PDOK luchtfoto)</label>
  <input type="range" id="contrastRange" min="0" max="2" value="1" step="0.01">
</div>

<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
<script>
  const styles = {
    ndw: "./ndw-style.json",
    "ndw-demo": "./ndw-demo.json",
    "pdok-luchtfoto": {
      version: 8,
      sources: {
        luchtfoto: {
          type: "raster",
          tiles: [
            "https://service.pdok.nl/hwh/luchtfotorgb/wmts/v1_0/Actueel_orthoHR/EPSG:3857/{z}/{x}/{y}.jpeg"
          ],
          tileSize: 256
        }
      },
      layers: [
        {
          id: "luchtfoto",
          type: "raster",
          source: "luchtfoto",
          paint: {
            "raster-brightness-max": 1,
            "raster-brightness-min": 0,
            "raster-contrast": 0,
            "raster-saturation": 0
          }
        }
      ]
    }
  };

  const map = new maplibregl.Map({
    container: "map",
    style: styles.ndw,
    center: [5.121, 52.08],
    zoom: 8
  });

  map.addControl(new maplibregl.NavigationControl(), "top-right");

  const select = document.getElementById("styleSelect");
  select.addEventListener("change", () => {
    map.setStyle(styles[select.value]);
  });

  const grayCheckbox = document.getElementById("grayNDW");

  function makeNDWGray() {
    const style = map.getStyle();
    if (!style || !style.layers) return;

    style.layers.forEach(layer => {
      if (!map.getLayer(layer.id)) return;

      if (layer.type === "fill" && map.getPaintProperty(layer.id, "fill-color")) {
        map.setPaintProperty(layer.id, "fill-color", "#DDD");
      }
      if (layer.type === "line" && map.getPaintProperty(layer.id, "line-color")) {
        map.setPaintProperty(layer.id, "line-color", "#888");
      }
      if (layer.type === "symbol") {
        if (map.getPaintProperty(layer.id, "text-color"))
          map.setPaintProperty(layer.id, "text-color", "#555");
        if (map.getPaintProperty(layer.id, "icon-color"))
          map.setPaintProperty(layer.id, "icon-color", "#555");
      }
    });
  }

  grayCheckbox.addEventListener("change", e => {
    if (e.target.checked) {
      makeNDWGray();
    } else {
      map.setStyle(styles[select.value]);
    }
  });

  const contrastSlider = document.getElementById("contrastRange");
  contrastSlider.addEventListener("input", () => {
    const value = parseFloat(contrastSlider.value);

    const style = map.getStyle();
    if (!style || !style.layers) return;

    style.layers.forEach(layer => {
      if (!map.getLayer(layer.id)) return;

      if (layer.type === "raster") {
        map.setPaintProperty(layer.id, "raster-brightness-max", value);
        map.setPaintProperty(layer.id, "raster-contrast", value - 1);
        map.setPaintProperty(layer.id, "raster-saturation", 1 - value);
      }
    });
  });

  map.on("load", () => console.log("Kaart geladen"));
  map.on("error", e => console.error("Kaartfout:", e.error || e));
</script>

</body>
</html>
